# Publishes to npm with provenance (n8n verified community nodes; required from May 1, 2026).
#
# --- Recommended: npm Trusted Publishing (OIDC) ---
# 1. npmjs.com → your package → Access / Publishing → Trusted Publisher → GitHub Actions
# 2. Match exactly: org/user, repo name, workflow filename `publish.yml` (case-sensitive)
# 3. No NPM_TOKEN secret needed; npm CLI uses short-lived OIDC on GitHub-hosted runners.
# 4. Requires npm CLI >= 11.5.1 (see `Upgrade npm` step below).
#
# --- Alternative: classic automation token ---
# If you cannot use Trusted Publishing yet, add repo secret NPM_TOKEN and uncomment
# NODE_AUTH_TOKEN under the publish step.
#
# n8n-node blocks bare `npm publish` unless RELEASE_MODE is set (same as `npm run release`).
name: Publish to npm

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for OIDC + provenance attestations on GitHub Actions

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 20 ships with npm 10.x.
      - name: Upgrade npm for OIDC / provenance
        run: npm install -g npm@^11.5.1

      - run: npm ci

      - run: npm run build

      # - name: Bump version
      #   run: npm version patch --no-git-tag-version

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          RELEASE_MODE: 'true'
          # Trusted Publishing: omit NODE_AUTH_TOKEN so the CLI uses OIDC from GitHub.
          # Token fallback: create secret NPM_TOKEN at Settings → Secrets → Actions, then uncomment:
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
